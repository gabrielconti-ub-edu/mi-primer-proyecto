<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Clientes - Frontend REST</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Gestión de Clientes</h1>

    <section class="form-section">
      <h2>Formulario de Cliente</h2>
      <form id="clienteForm">
        <!-- ID ahora visible y readonly -->
        <div class="form-row">
          <label for="CLIENTE_ID">ID:</label>
          <input type="text" id="CLIENTE_ID" readonly placeholder="(nuevo)">
        </div>

        <div class="form-row">
          <label for="NOMBRE_CLI">Nombre:</label>
          <input type="text" id="NOMBRE_CLI" required>
        </div>
        <div class="form-row">
          <label for="DOMICILIO">Domicilio:</label>
          <input type="text" id="DOMICILIO" required>
        </div>
        <div class="form-row">
          <label for="MAIL">Email:</label>
          <input type="email" id="MAIL" required>
        </div>
        <div class="form-row">
          <label for="TELEFONO">Teléfono:</label>
          <input type="text" id="TELEFONO" required>
        </div>

        <div class="form-actions">
          <button type="submit" id="guardarBtn">Guardar</button>
          <button type="button" id="cancelarBtn" class="cancelar">Cancelar</button>
        </div>
      </form>

      <div id="mensaje" class="mensaje" aria-live="polite"></div>
    </section>

    <section class="table-section">
      <h2>Listado de Clientes</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Domicilio</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="clientesTable"></tbody>
      </table>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
